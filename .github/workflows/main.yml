name: Generate WARP config (wgcf)

on:
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download wgcf
        run: |
          WGCF_VERSION=$(curl -fsSL https://api.github.com/repos/ViRb3/wgcf/releases/latest | jq -r '.tag_name')
          curl -fsSL -o wgcf.tar.gz \
            https://github.com/ViRb3/wgcf/releases/download/${WGCF_VERSION}/wgcf_${WGCF_VERSION#v}_linux_amd64.tar.gz
          tar xzf wgcf.tar.gz
          chmod +x wgcf

      - name: Register WARP account
        run: |
          yes | ./wgcf register
          ls -l

      - name: Generate WireGuard profile
        run: |
          ./wgcf generate
          ls -l

      - name: Upload config
        uses: actions/upload-artifact@v4
        with:
          name: wgcf-profile
          path: wgcf-profile.conf
