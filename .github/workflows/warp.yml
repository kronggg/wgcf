name: Generate WARP config (wgcf)

on:
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download wgcf
        run: |
          WGCF_VERSION="2.2.30"
          echo "Using wgcf version: $WGCF_VERSION"
          curl -fsSL -o wgcf.zip \
            https://github.com/ViRb3/wgcf/releases/download/v${WGCF_VERSION}/wgcf_${WGCF_VERSION}_linux_amd64.zip
          unzip wgcf.zip
          chmod +x wgcf
          ls -l

      - name: Register WARP account
        run: |
          yes | ./wgcf register
          ls -l

      - name: Generate WireGuard profile
        run: |
          ./wgcf generate
          ls -l

      - name: Upload config
        uses: actions/upload-artifact@v4
        with:
          name: wgcf-profile
          path: wgcf-profile.conf
